<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1132" width="800" height="1132" role="img" aria-label="Curriculum Vitae — S. Lavi: an engraved resume plate listing selected works, instruments and traditions, sealed with the closing ring H1 equals zero.">
  <defs>
    <radialGradient id="void" cx="0.5" cy="0.3" r="0.95">
      <stop offset="0" stop-color="#161033"/>
      <stop offset="0.6" stop-color="#0b0820"/>
      <stop offset="1" stop-color="#05040f"/>
    </radialGradient>
    <linearGradient id="aur" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6fe3c1"/>
      <stop offset="1" stop-color="#8b7cff"/>
    </linearGradient>
    <linearGradient id="spec" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="800" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#6fe3c1"/>
      <stop offset="0.5" stop-color="#8b7cff"/>
      <stop offset="1" stop-color="#e6c15a"/>
      <animate attributeName="x1" values="0;-800" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="800;0" dur="16s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.68">
      <stop offset="0.68" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="haze" x="-40%" y="-120%" width="180%" height="340%"><feGaussianBlur stdDeviation="12"/></filter>
    <pattern id="gkey" width="42" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 3 H42 M6 3 V15 H24 V8 H12 V12" fill="none" stroke="#d9b04a" stroke-opacity="0.5" stroke-width="1.4"/>
    </pattern>
    <style><![CDATA[
      .ser  { font-family: 'Palatino Linotype', Georgia, serif; }
      .mono { font-family: 'Courier New', monospace; }
      .tw    { animation: tw 3.6s ease-in-out infinite; }
      .drift { animation: drift 20s ease-in-out infinite; }
      .rm-static { display: none; }
      @keyframes tw    { 0%,100% { opacity:.15 } 50% { opacity:.8 } }
      @keyframes drift { 0%,100% { transform: translateX(-14px) } 50% { transform: translateX(14px) } }
      @media (prefers-reduced-motion: reduce) {
        .tw,.drift { animation: none }
        .rm-anim { display: none }
        .rm-static { display: inline }
      }
    ]]></style>
  </defs>

  <rect width="800" height="1132" fill="#05040f"/>
  <rect x="16" y="16" width="768" height="1100" rx="10" fill="url(#void)"/>

  <!-- aurora behind the header -->
  <g class="drift" opacity="0.15" fill="none" stroke="url(#aur)" filter="url(#haze)">
    <path d="M60 92 Q 240 62 420 82 T 760 68" stroke-width="24"/>
  </g>

  <!-- stars -->
  <g fill="#dfe8ff">
    <circle class="tw" cx="120" cy="70"  r="1.1" style="animation-delay:.4s"/>
    <circle class="tw" cx="690" cy="60"  r="1.2" style="animation-delay:1.6s"/>
    <circle class="tw" cx="740" cy="150" r="1"   style="animation-delay:2.4s"/>
    <circle class="tw" cx="66"  cy="170" r="1"   style="animation-delay:.9s"/>
    <circle class="tw" cx="726" cy="940" r="1.1" style="animation-delay:1.2s"/>
    <circle class="tw" cx="72"  cy="900" r="1"   style="animation-delay:2.9s"/>
  </g>

  <!-- ======================= HEADER ======================= -->
  <text x="400" y="58" text-anchor="middle" class="mono" font-size="10" letter-spacing="5" fill="#7fb0d8" fill-opacity="0.9">· CURRICULUM VITAE ·</text>
  <text x="400" y="122" text-anchor="middle" class="ser" font-size="42" letter-spacing="12" fill="#fff2c4">S. LAVI</text>
  <text x="400" y="150" text-anchor="middle" class="mono" font-size="12" letter-spacing="2" fill="#9aa3c7">independent builder &amp; researcher · idl3o</text>
  <text x="400" y="170" text-anchor="middle" class="mono" font-size="10.5" letter-spacing="3" fill="#e6c15a">protocol design · mechanism theory · philosophy</text>
  <rect x="80" y="190" width="640" height="1.6" fill="url(#spec)"/>

  <!-- ======================= SELECTED WORKS ======================= -->
  <text x="80" y="238" class="mono" font-size="11" letter-spacing="6" fill="#d9b04a">SELECTED WORKS</text>
  <line x1="218" y1="234" x2="720" y2="234" stroke="#d9b04a" stroke-opacity="0.3" stroke-width="1"/>

  <!-- 1 · Proof of Coherence -->
  <g transform="translate(96,268)" fill="none" stroke="#e6c15a" stroke-width="1.3">
    <circle r="8"/>
    <g fill="#e6c15a" stroke="none"><circle cx="0" cy="-8" r="1.6"/><circle cx="6.9" cy="4" r="1.6"/><circle cx="-6.9" cy="4" r="1.6"/></g>
  </g>
  <text x="124" y="272" class="ser" font-size="15" letter-spacing="1" fill="#fff2c4">Proof of Coherence</text>
  <text x="720" y="272" text-anchor="end" class="mono" font-size="9" letter-spacing="1" fill="#7fb0d8">WHITEPAPER v0.2</text>
  <text x="124" y="291" class="mono" font-size="10.5" fill="#9aa3c7">Sheaf-cohomological incentive mechanism for decentralized AI — a Hodge-Laplacian</text>
  <text x="124" y="306" class="mono" font-size="10.5" fill="#9aa3c7">frame unifying coherence and resonance rewards over Bittensor / Yuma consensus.</text>
  <text x="124" y="322" class="mono" font-size="9.5" fill="#7fb0d8" fill-opacity="0.8">idl3o.github.io/derivation-of-value</text>

  <!-- 2 · Derivation of Value -->
  <g transform="translate(96,356)" fill="none" stroke="#e6c15a" stroke-width="1.3">
    <path d="M-7 -6 H7 V7 H-7 Z M0 -6 V7 M-4 -2 H-1 M-4 2 H-1 M1 -2 H4 M1 2 H4"/>
  </g>
  <text x="124" y="360" class="ser" font-size="15" letter-spacing="1" fill="#fff2c4">Derivation of Value</text>
  <text x="720" y="360" text-anchor="end" class="mono" font-size="9" letter-spacing="1" fill="#7fb0d8">ANTHOLOGY · CC BY 4.0</text>
  <text x="124" y="379" class="mono" font-size="10.5" fill="#9aa3c7">An anthology of mechanism-design papers — Combination Proofs, Goodhart-asymptotic</text>
  <text x="124" y="394" class="mono" font-size="10.5" fill="#9aa3c7">design — published in a Borgesian, absent-narrator register.</text>
  <text x="124" y="410" class="mono" font-size="9.5" fill="#7fb0d8" fill-opacity="0.8">whitepapers · onboarding companion · Jekyll site</text>

  <!-- 3 · Kryptonium -->
  <g transform="translate(96,444)" fill="none" stroke="#e6c15a" stroke-width="1.3">
    <circle r="2" fill="#e6c15a" stroke="none"/>
    <path d="M-8 -5 A 10 10 0 0 1 -8 5 M8 -5 A 10 10 0 0 0 8 5"/>
  </g>
  <text x="124" y="448" class="ser" font-size="15" letter-spacing="1" fill="#fff2c4">Kryptonium · Astrophysical Oracle</text>
  <text x="720" y="448" text-anchor="end" class="mono" font-size="9" letter-spacing="1" fill="#7fb0d8">CONCEPT / RFC</text>
  <text x="124" y="467" class="mono" font-size="10.5" fill="#9aa3c7">A negentropy-anchored currency: consensus read from pulsar timing arrays, black-hole</text>
  <text x="124" y="482" class="mono" font-size="10.5" fill="#9aa3c7">astrometry, and the covariant entropy bound — value denominated in preserved order.</text>
  <text x="124" y="498" class="mono" font-size="9.5" fill="#7fb0d8" fill-opacity="0.8">sketched within the anthology</text>

  <!-- 4 · live-video-player -->
  <g transform="translate(96,532)" fill="none" stroke="#e6c15a" stroke-width="1.3">
    <circle r="8.5"/>
    <path d="M-2.5 -4 L4.5 0 L-2.5 4 Z" fill="#e6c15a" stroke="none"/>
  </g>
  <text x="124" y="536" class="ser" font-size="15" letter-spacing="1" fill="#fff2c4">live-video-player</text>
  <text x="720" y="536" text-anchor="end" class="mono" font-size="9" letter-spacing="1" fill="#7fb0d8">PLATFORM</text>
  <text x="124" y="555" class="mono" font-size="10.5" fill="#9aa3c7">Self-hosted RTMP / HLS streaming with opt-in Web3 rails — on-chain content registry,</text>
  <text x="124" y="570" class="mono" font-size="10.5" fill="#9aa3c7">playback in the clear; CI, coverage and Solidity hardening in active progress.</text>
  <text x="124" y="586" class="mono" font-size="9.5" fill="#7fb0d8" fill-opacity="0.8">github.com/idl3o/live-video-player</text>

  <!-- 5 · gallery -->
  <g transform="translate(96,620)" fill="none" stroke="#e6c15a" stroke-width="1.3">
    <rect x="-7" y="-7" width="14" height="14"/>
    <path d="M-7 -4 H-4 V-7 M4 -7 V-4 H7 M7 4 H4 V7 M-4 7 V4 H-7"/>
  </g>
  <text x="124" y="624" class="ser" font-size="15" letter-spacing="1" fill="#fff2c4">gallery</text>
  <text x="720" y="624" text-anchor="end" class="mono" font-size="9" letter-spacing="1" fill="#7fb0d8">COLLECTION</text>
  <text x="124" y="643" class="mono" font-size="10.5" fill="#9aa3c7">A dozen hand-built, self-animating SVG plates — Norse, alchemical, celestial —</text>
  <text x="124" y="658" class="mono" font-size="10.5" fill="#9aa3c7">one file each, zero dependencies, all honouring prefers-reduced-motion.</text>
  <text x="124" y="674" class="mono" font-size="9.5" fill="#7fb0d8" fill-opacity="0.8">idl3o.github.io/gallery</text>

  <!-- ======================= INSTRUMENTS ======================= -->
  <text x="80" y="728" class="mono" font-size="11" letter-spacing="6" fill="#d9b04a">INSTRUMENTS</text>
  <line x1="196" y1="724" x2="720" y2="724" stroke="#d9b04a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="756" class="mono" font-size="10.5" fill="#9aa3c7">sheaf cohomology · spectral graph methods · mechanism design · game theory</text>
  <text x="80" y="776" class="mono" font-size="10.5" fill="#9aa3c7">typescript · solidity / evm · python · node · vue / react · ipfs / helia</text>
  <text x="80" y="796" class="mono" font-size="10.5" fill="#9aa3c7">bittensor &amp; yuma · rtmp / hls · svg / smil craft · technical &amp; philosophical writing</text>

  <!-- ======================= TRADITIONS ======================= -->
  <text x="80" y="840" class="mono" font-size="11" letter-spacing="6" fill="#d9b04a">TRADITIONS</text>
  <line x1="188" y1="836" x2="720" y2="836" stroke="#d9b04a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="868" class="mono" font-size="10.5" fill="#9aa3c7">advaita vedānta · madhyamaka · dzogchen · taoism · hermetica · kabbalah</text>
  <text x="80" y="888" class="mono" font-size="10.5" fill="#9aa3c7">comparative mythology · archaeoastronomy · information-theoretic limits</text>

  <!-- ======================= SEAL &amp; FOOTER ======================= -->
  <g transform="translate(110,982)">
    <circle r="26" fill="none" stroke="#d9b04a" stroke-opacity="0.25" stroke-width="1.2"/>
    <g class="rm-anim">
      <circle r="26" fill="none" stroke="#e6c15a" stroke-width="2" stroke-linecap="round"
              pathLength="100" stroke-dasharray="100" stroke-dashoffset="24" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" values="24;24;0;0;24" keyTimes="0;0.1;0.45;0.85;1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
      </circle>
    </g>
    <circle class="rm-static" r="26" fill="none" stroke="#e6c15a" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" class="mono" font-size="11" fill="#d9b04a">H¹= 0</text>
  </g>
  <text x="400" y="978" text-anchor="middle" class="ser" font-style="italic" font-size="15" letter-spacing="1" fill="#d9b04a">Freedom is emergent.</text>
  <text x="400" y="998" text-anchor="middle" class="mono" font-size="9.5" fill="#7fb0d8" fill-opacity="0.8">the weave completes; one thread goes free.</text>
  <text x="720" y="972" text-anchor="end" class="mono" font-size="9.5" fill="#7fb0d8">github.com/idl3o</text>
  <text x="720" y="990" text-anchor="end" class="mono" font-size="9.5" fill="#7fb0d8">idl3o.github.io</text>
  <text x="720" y="1008" text-anchor="end" class="mono" font-size="9.5" fill="#7fb0d8" fill-opacity="0.7">kernow · sjlavieth@gmail.com</text>

  <rect x="80" y="1040" width="640" height="1.6" fill="url(#spec)"/>
  <text x="400" y="1068" text-anchor="middle" class="mono" font-size="10" letter-spacing="6" fill="#e6c15a">· ᚠᚱᛖᛟ ·</text>

  <!-- vignette + frame -->
  <rect x="16" y="16" width="768" height="1100" rx="10" fill="url(#vig)"/>
  <rect x="16" y="16" width="768" height="1100" rx="10" fill="none" stroke="#d9b04a" stroke-opacity="0.35" stroke-width="1"/>
  <rect x="46" y="20" width="708" height="16" fill="url(#gkey)"/>
  <rect x="46" y="1096" width="708" height="16" fill="url(#gkey)"/>

  <!-- corner medallions: the identity sigils -->
  <g fill="rgba(217,176,74,0.1)" stroke="#d9b04a" stroke-width="1.1">
    <circle cx="28" cy="28" r="12"/><circle cx="772" cy="28" r="12"/>
    <circle cx="28" cy="1104" r="12"/><circle cx="772" cy="1104" r="12"/>
  </g>
  <g fill="none" stroke="#e6c15a" stroke-width="1.3" stroke-linecap="round">
    <path d="M23.5 24.5 H32.5 M22 28 H34 M23.5 31.5 H32.5"/>
    <path d="M772 34.5 V22 M772 26.5 L767.5 21 M772 26.5 L776.5 21 M772 30.5 L768.5 27 M772 30.5 L775.5 27"/>
    <circle cx="28" cy="1104" r="5.5"/>
    <path d="M766.5 1106 Q769.5 1100.5 772 1103 Q774.5 1100.5 777.5 1106"/>
  </g>
  <g fill="#e6c15a" stroke="none">
    <circle cx="28" cy="1104" r="1.4"/>
    <circle cx="31.8" cy="1100.2" r="1.2"/>
  </g>
</svg>
